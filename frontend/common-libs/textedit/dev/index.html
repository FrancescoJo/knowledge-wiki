<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TextEdit — Development</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --colour-bg:           #f5f5f5;
      --colour-surface:      #ffffff;
      --colour-border:       #d0d0d0;
      --colour-border-focus: #4a90d9;
      --colour-text:         #1a1a1a;
      --colour-text-muted:   #6b6b6b;
      --colour-primary:      #0052cc;
      --colour-primary-hover:#0047b3;
      --colour-btn-bg:       #f0f0f0;
      --colour-btn-active:   #0052cc;
      --colour-btn-active-fg:#ffffff;
      --colour-dev-bg:       #1e1e2e;
      --colour-dev-text:     #cdd6f4;
      --colour-dev-border:   #45475a;
      --radius:              4px;
      --shadow:              0 1px 3px rgba(0,0,0,.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: var(--colour-bg);
      color: var(--colour-text);
      min-height: 100vh;
    }

    /* ── Page layout ─────────────────────────────────────────────────── */

    .layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "header  header"
        "editor  devpanel";
      height: 100vh;
      overflow: hidden;
    }

    /* ── Page header ─────────────────────────────────────────────────── */

    .page-header {
      grid-area: header;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 20px;
      height: 48px;
      background: var(--colour-surface);
      border-bottom: 1px solid var(--colour-border);
      box-shadow: var(--shadow);
    }

    .breadcrumb {
      font-size: 13px;
      color: var(--colour-text-muted);
    }

    .breadcrumb a { color: var(--colour-primary); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    /* ── Editor column ───────────────────────────────────────────────── */

    .editor-column {
      grid-area: editor;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--colour-bg);
    }

    .edit-form {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      margin: 20px;
      background: var(--colour-surface);
      border: 1px solid var(--colour-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .title-input {
      width: 100%;
      padding: 16px 20px 12px;
      font-size: 24px;
      font-weight: 600;
      border: none;
      border-bottom: 1px solid var(--colour-border);
      outline: none;
      color: var(--colour-text);
    }

    .title-input:focus { border-bottom-color: var(--colour-border-focus); }

    /* ── Toolbar ─────────────────────────────────────────────────────── */

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 2px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--colour-border);
      background: var(--colour-surface);
    }

    .toolbar-separator {
      width: 1px;
      height: 20px;
      background: var(--colour-border);
      margin: 0 4px;
    }

    .toolbar button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      padding: 0 6px;
      font-size: 13px;
      font-family: inherit;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--colour-text);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }

    .toolbar button:hover { background: var(--colour-btn-bg); border-color: var(--colour-border); }

    .toolbar button.is-active {
      background: var(--colour-btn-active);
      border-color: var(--colour-btn-active);
      color: var(--colour-btn-active-fg);
    }

    /* ── Editor area ─────────────────────────────────────────────────── */

    .editor-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    #editor { outline: none; min-height: 100%; }

    /* TipTap content styles */
    .ProseMirror { outline: none; }
    .ProseMirror > * + * { margin-top: 0.75em; }
    .ProseMirror p.is-editor-empty:first-child::before {
      content: attr(data-placeholder);
      float: left;
      color: var(--colour-text-muted);
      pointer-events: none;
      height: 0;
    }

    .ProseMirror h1 { font-size: 1.8em; font-weight: 700; }
    .ProseMirror h2 { font-size: 1.4em; font-weight: 600; }
    .ProseMirror h3 { font-size: 1.2em; font-weight: 600; }
    .ProseMirror h4, .ProseMirror h5, .ProseMirror h6 { font-size: 1em; font-weight: 600; }

    .ProseMirror ul, .ProseMirror ol { padding-left: 1.4em; }
    .ProseMirror li > p { margin: 0; }

    .ProseMirror blockquote {
      border-left: 3px solid var(--colour-border-focus);
      padding-left: 12px;
      color: var(--colour-text-muted);
      font-style: italic;
    }

    .ProseMirror code {
      background: #f0f0f0;
      border-radius: 3px;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 0.875em;
      padding: 1px 4px;
    }

    .ProseMirror pre {
      background: #1e1e2e;
      border-radius: var(--radius);
      color: #cdd6f4;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 0.875em;
      padding: 12px 16px;
      overflow-x: auto;
    }

    .ProseMirror pre code { background: none; color: inherit; padding: 0; }

    .ProseMirror table {
      border-collapse: collapse;
      width: 100%;
    }

    .ProseMirror th, .ProseMirror td {
      border: 1px solid var(--colour-border);
      padding: 6px 10px;
      text-align: left;
    }

    .ProseMirror th { background: var(--colour-bg); font-weight: 600; }

    .ProseMirror ul[data-type="taskList"] { list-style: none; padding-left: 0; }
    .ProseMirror ul[data-type="taskList"] li { display: flex; gap: 8px; align-items: flex-start; }
    .ProseMirror ul[data-type="taskList"] li > label { margin-top: 2px; }
    .ProseMirror ul[data-type="taskList"] li[data-checked="true"] > div { text-decoration: line-through; color: var(--colour-text-muted); }

    /* ── Action bar ──────────────────────────────────────────────────── */

    .action-bar {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      border-top: 1px solid var(--colour-border);
    }

    .btn-primary {
      padding: 6px 16px;
      background: var(--colour-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }

    .btn-primary:hover { background: var(--colour-primary-hover); }

    .btn-secondary {
      padding: 6px 16px;
      background: var(--colour-surface);
      color: var(--colour-text);
      border: 1px solid var(--colour-border);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }

    .btn-secondary:hover { background: var(--colour-btn-bg); }

    /* ── Dev panel ───────────────────────────────────────────────────── */

    .dev-panel {
      grid-area: devpanel;
      display: flex;
      flex-direction: column;
      background: var(--colour-dev-bg);
      color: var(--colour-dev-text);
      border-left: 1px solid var(--colour-dev-border);
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      overflow: hidden;
    }

    .dev-panel-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--colour-dev-border);
      font-size: 11px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #89b4fa;
    }

    .dev-panel-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--colour-dev-border);
    }

    .dev-panel-controls button {
      padding: 4px 10px;
      font-size: 11px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #313244;
      color: var(--colour-dev-text);
      border: 1px solid var(--colour-dev-border);
      border-radius: var(--radius);
      cursor: pointer;
    }

    .dev-panel-controls button:hover { background: #45475a; }

    .dev-panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--colour-dev-border);
    }

    .dev-tab {
      padding: 6px 14px;
      font-size: 11px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      color: var(--colour-text-muted);
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
    }

    .dev-tab.is-active { color: #89b4fa; border-bottom-color: #89b4fa; }

    .dev-panel-output {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
    }

    #json-output, #json-output-live {
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
    }

    .dev-hint {
      padding: 14px;
      color: var(--colour-text-muted);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="layout">

    <!-- ── Page header ──────────────────────────────────────────────── -->
    <header class="page-header">
      <nav class="breadcrumb">
        <a href="#">Home</a> / <a href="#">Development Notes</a> / Edit
      </nav>
    </header>

    <!-- ── Editor column ────────────────────────────────────────────── -->
    <div class="editor-column">
      <div class="edit-form">

        <input
          type="text"
          class="title-input"
          placeholder="Document title"
          value="Project Architecture Overview"
        />

        <!-- Toolbar (represents the wiki's formatting toolbar) -->
        <div class="toolbar" id="toolbar">
          <button data-cmd="bold"        title="Bold (Ctrl+B)"><b>B</b></button>
          <button data-cmd="italic"      title="Italic (Ctrl+I)"><i>I</i></button>
          <button data-cmd="strike"      title="Strikethrough"><s>S</s></button>
          <button data-cmd="code"        title="Inline code">‹›</button>

          <div class="toolbar-separator"></div>

          <button data-cmd="heading" data-arg="1" title="Heading 1">H1</button>
          <button data-cmd="heading" data-arg="2" title="Heading 2">H2</button>
          <button data-cmd="heading" data-arg="3" title="Heading 3">H3</button>
          <button data-cmd="paragraph"             title="Paragraph">¶</button>

          <div class="toolbar-separator"></div>

          <button data-cmd="bulletList"  title="Bullet list">• —</button>
          <button data-cmd="orderedList" title="Ordered list">1.</button>
          <button data-cmd="taskList"    title="Task list">☑</button>

          <div class="toolbar-separator"></div>

          <button data-cmd="blockquote"  title="Blockquote">"</button>
          <button data-cmd="codeBlock"   title="Code block">{}</button>
          <button data-cmd="insertTable" title="Insert table">⊞</button>
        </div>

        <!-- Editor mount point -->
        <div class="editor-wrapper">
          <div id="editor"></div>
        </div>

        <!-- Action bar (represents the wiki's save/cancel controls) -->
        <div class="action-bar">
          <button class="btn-primary"   id="btn-save">Save</button>
          <button class="btn-secondary" id="btn-cancel">Cancel</button>
        </div>

      </div>
    </div>

    <!-- ── Dev panel ────────────────────────────────────────────────── -->
    <aside class="dev-panel">
      <div class="dev-panel-header">Development Tools</div>

      <div class="dev-panel-controls">
        <button id="btn-get-json">Snapshot JSON</button>
        <button id="btn-toggle-readonly">Make Read-only</button>
        <button id="btn-load-sample">Reload Sample</button>
      </div>

      <div class="dev-panel-tabs">
        <button class="dev-tab is-active" data-tab="live">Live output</button>
        <button class="dev-tab"           data-tab="snapshot">Snapshot</button>
      </div>

      <div class="dev-panel-output">
        <div id="tab-live">
          <div class="dev-hint">JSON updates on every keystroke.</div>
          <pre id="json-output-live"></pre>
        </div>
        <div id="tab-snapshot" style="display:none">
          <div class="dev-hint">Click "Snapshot JSON" to capture current content.</div>
          <pre id="json-output"></pre>
        </div>
      </div>
    </aside>

  </div>

  <script type="module">
    // Tab switching — dev-only, not part of the textedit module
    document.querySelectorAll('.dev-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.dev-tab').forEach(t => t.classList.remove('is-active'))
        tab.classList.add('is-active')
        document.getElementById('tab-live').style.display     = tab.dataset.tab === 'live'     ? '' : 'none'
        document.getElementById('tab-snapshot').style.display = tab.dataset.tab === 'snapshot' ? '' : 'none'
      })
    })
  </script>
  <script type="module" src="./main.ts"></script>
</body>
</html>
