<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Login Popup — Development</title>
  <style>
      *, *::before, *::after {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
      }

      body {
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          color: #333;
          background: #fff;
      }

      /* Header */
      .site-header {
          display: flex;
          align-items: center;
          gap: 1rem;
          padding: 0 1.5rem;
          height: 56px;
          background: #1a1a2e;
          color: #fff;
          flex-shrink: 0;
      }

      .site-logo {
          font-size: 1rem;
          font-weight: 700;
          color: #fff;
          text-decoration: none;
          white-space: nowrap;
      }

      .site-nav {
          flex: 1;
          overflow: hidden;
      }

      .nav-items {
          display: flex;
          list-style: none;
          height: 56px;
      }

      /* Login button */
      .login-btn {
          flex-shrink: 0;
          padding: 0.375rem 0.875rem;
          border: 1px solid rgba(255, 255, 255, 0.4);
          border-radius: 4px;
          background: transparent;
          color: rgba(255, 255, 255, 0.9);
          font-size: 0.875rem;
          white-space: nowrap;
          cursor: pointer;
      }

      .login-btn:hover {
          background: rgba(255, 255, 255, 0.1);
          color: #fff;
      }

      /* Breadcrumb bar */
      .breadcrumb-bar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0.5rem 1.5rem;
          background: #f8f9fa;
          border-bottom: 1px solid #e0e0e0;
          font-size: 0.875rem;
          flex-shrink: 0;
      }

      .breadcrumb {
          color: #666;
      }

      /* Content area */
      .content-area {
          flex: 1;
          padding: 2rem 1.5rem;
      }

      /* Footer */
      .site-footer {
          padding: 0.875rem 1.5rem;
          background: #f8f9fa;
          border-top: 1px solid #e0e0e0;
          text-align: center;
          font-size: 0.8rem;
          color: #888;
          flex-shrink: 0;
      }

      /* Login dialog */
      .login-dialog {
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          margin: 0;
          border: none;
          border-radius: 8px;
          box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
          padding: 0;
          width: 100%;
          max-width: 380px;
      }

      .login-dialog::backdrop {
          background: rgba(0, 0, 0, 0.45);
      }

      .login-form {
          display: flex;
          flex-direction: column;
          gap: 1rem;
          padding: 1.5rem;
      }

      .login-dialog-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
      }

      .login-dialog-title {
          font-size: 1.1rem;
          font-weight: 600;
          color: #1a1a2e;
      }

      .login-dialog-close {
          background: none;
          border: none;
          font-size: 1.1rem;
          color: #888;
          cursor: pointer;
          padding: 0.25rem;
          line-height: 1;
      }

      .login-dialog-close:hover {
          color: #333;
      }

      .login-field {
          display: flex;
          flex-direction: column;
          gap: 0.375rem;
      }

      .login-label {
          font-size: 0.875rem;
          font-weight: 500;
          color: #444;
      }

      .login-input {
          padding: 0.5rem 0.75rem;
          border: 1px solid #ccc;
          border-radius: 4px;
          font-size: 0.95rem;
          width: 100%;
      }

      .login-input:focus {
          outline: none;
          border-color: #667eea;
          box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
      }

      .login-password-wrapper {
          position: relative;
          display: flex;
          align-items: center;
      }

      .login-password-wrapper .login-input {
          padding-right: 4rem;
      }

      .login-password-toggle {
          position: absolute;
          right: 0.5rem;
          background: none;
          border: none;
          font-size: 0.8rem;
          color: #667eea;
          cursor: pointer;
          padding: 0.25rem;
          white-space: nowrap;
      }

      .login-password-toggle:hover {
          color: #5568d3;
      }

      .login-error {
          font-size: 0.875rem;
          color: #dc3545;
          min-height: 1.25rem;
      }

      .login-submit {
          padding: 0.6rem;
          background: #667eea;
          color: #fff;
          border: none;
          border-radius: 4px;
          font-size: 0.95rem;
          font-weight: 500;
          cursor: pointer;
      }

      .login-submit:hover {
          background: #5568d3;
      }

      /* Dev panel */
      .dev-panel {
          background: #f0f4ff;
          border: 1px dashed #667eea;
          border-radius: 6px;
          padding: 1rem 1.5rem;
          font-size: 0.875rem;
          color: #555;
      }

      .dev-panel p {
          margin-bottom: 0.5rem;
      }

      .dev-panel p:last-child {
          margin-bottom: 0;
      }

      .dev-panel strong {
          color: #1a1a2e;
      }
  </style>
</head>
<body class="site-body">

<header class="site-header">
  <a class="site-logo" href="/">Omnimemo</a>
  <span class="build-phase-badge build-phase-local">dev</span>
  <nav aria-label="Main navigation" class="site-nav">
    <ul class="nav-items"></ul>
  </nav>
  <button class="login-btn" onclick="document.getElementById('login-popup').showModal()"
          type="button">Log In
  </button>
</header>

<div class="breadcrumb-bar">
  <span class="breadcrumb">Home</span>
</div>

<main class="content-area">
  <div class="dev-panel">
    <p>
      <strong>Login Popup — Development</strong>
    </p>
    <p>Click <strong>Log In</strong> in the header to open the login popup.</p>
    <p>Password visibility toggle and form validation are active. Form submission is disabled (no backend in dev
      mode).</p>
  </div>
</main>

<footer class="site-footer">
  <p>Omnimemo</p>
</footer>

<dialog aria-labelledby="login-popup-title" class="login-dialog" id="login-popup">
  <form class="login-form" id="login-form" onsubmit="return false">
    <header class="login-dialog-header">
      <h2 class="login-dialog-title" id="login-popup-title">Log In</h2>
      <button aria-label="Close login dialog" class="login-dialog-close" onclick="document.getElementById('login-popup').close()"
              type="button">&#x2715;
      </button>
    </header>

    <div class="login-field">
      <label class="login-label" for="login-email">Email</label>
      <input autocomplete="email" class="login-input" id="login-email" name="email"
             required type="email">
    </div>

    <div class="login-field">
      <label class="login-label" for="login-password">Password</label>
      <div class="login-password-wrapper">
        <input autocomplete="current-password" class="login-input" id="login-password" name="password"
               required type="password">
        <button aria-label="Show password" class="login-password-toggle" data-target="login-password"
                type="button">Show
        </button>
      </div>
    </div>

    <p aria-live="polite" class="login-error" id="login-error"></p>

    <button class="login-submit" type="submit">Log In</button>
  </form>
</dialog>

<script src="./main.ts" type="module"></script>
</body>
</html>
