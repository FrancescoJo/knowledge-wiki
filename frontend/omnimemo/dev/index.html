<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Popup — Development</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #333;
            background: #fff;
        }

        /* Header */
        .site-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0 1.5rem;
            height: 56px;
            background: #1a1a2e;
            color: #fff;
            flex-shrink: 0;
        }

        .site-logo {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            white-space: nowrap;
        }

        .site-nav { flex: 1; overflow: hidden; }

        .nav-items {
            display: flex;
            list-style: none;
            height: 56px;
        }

        /* Login button */
        .login-btn {
            flex-shrink: 0;
            padding: 0.375rem 0.875rem;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 4px;
            background: transparent;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.875rem;
            white-space: nowrap;
            cursor: pointer;
        }

        .login-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

        /* Breadcrumb bar */
        .breadcrumb-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1.5rem;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            font-size: 0.875rem;
            flex-shrink: 0;
        }

        .breadcrumb { color: #666; }

        /* Content area */
        .content-area { flex: 1; padding: 2rem 1.5rem; }

        /* Footer */
        .site-footer {
            padding: 0.875rem 1.5rem;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            flex-shrink: 0;
        }

        /* Login dialog */
        .login-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            border: none;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
            padding: 0;
            width: 100%;
            max-width: 380px;
        }

        .login-dialog::backdrop { background: rgba(0, 0, 0, 0.45); }

        .login-form { display: flex; flex-direction: column; gap: 1rem; padding: 1.5rem; }

        .login-dialog-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .login-dialog-title { font-size: 1.1rem; font-weight: 600; color: #1a1a2e; }

        .login-dialog-close {
            background: none;
            border: none;
            font-size: 1.1rem;
            color: #888;
            cursor: pointer;
            padding: 0.25rem;
            line-height: 1;
        }

        .login-dialog-close:hover { color: #333; }

        .login-field { display: flex; flex-direction: column; gap: 0.375rem; }

        .login-label { font-size: 0.875rem; font-weight: 500; color: #444; }

        .login-input {
            padding: 0.5rem 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
            width: 100%;
        }

        .login-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        .login-password-wrapper { position: relative; display: flex; align-items: center; }

        .login-password-wrapper .login-input { padding-right: 4rem; }

        .login-password-toggle {
            position: absolute;
            right: 0.5rem;
            background: none;
            border: none;
            font-size: 0.8rem;
            color: #667eea;
            cursor: pointer;
            padding: 0.25rem;
            white-space: nowrap;
        }

        .login-password-toggle:hover { color: #5568d3; }

        .login-error {
            font-size: 0.875rem;
            color: #dc3545;
            min-height: 1.25rem;
        }

        .login-submit {
            padding: 0.6rem;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
        }

        .login-submit:hover { background: #5568d3; }

        /* Dev panel */
        .dev-panel {
            background: #f0f4ff;
            border: 1px dashed #667eea;
            border-radius: 6px;
            padding: 1rem 1.5rem;
            font-size: 0.875rem;
            color: #555;
        }

        .dev-panel p { margin-bottom: 0.5rem; }
        .dev-panel p:last-child { margin-bottom: 0; }
        .dev-panel strong { color: #1a1a2e; }
    </style>
</head>
<body class="site-body">

<header class="site-header">
    <a class="site-logo" href="/">Omnimemo</a>
    <nav class="site-nav" aria-label="Main navigation">
        <ul class="nav-items"></ul>
    </nav>
    <button class="login-btn" type="button"
            onclick="document.getElementById('login-popup').showModal()">Log In</button>
</header>

<div class="breadcrumb-bar">
    <span class="breadcrumb">Home</span>
</div>

<main class="content-area">
    <div class="dev-panel">
        <p>
            <strong>Login Popup — Development</strong>
        </p>
        <p>Click <strong>Log In</strong> in the header to open the login popup.</p>
        <p>Password visibility toggle and form validation are active. Form submission is disabled (no backend in dev mode).</p>
    </div>
</main>

<footer class="site-footer">
    <p>Omnimemo</p>
</footer>

<dialog id="login-popup" class="login-dialog" aria-labelledby="login-popup-title">
    <form id="login-form" class="login-form" onsubmit="return false">
        <header class="login-dialog-header">
            <h2 id="login-popup-title" class="login-dialog-title">Log In</h2>
            <button type="button" class="login-dialog-close" aria-label="Close login dialog"
                    onclick="document.getElementById('login-popup').close()">&#x2715;</button>
        </header>

        <div class="login-field">
            <label for="login-email" class="login-label">Email</label>
            <input id="login-email" name="email" type="email" class="login-input"
                   autocomplete="email" required>
        </div>

        <div class="login-field">
            <label for="login-password" class="login-label">Password</label>
            <div class="login-password-wrapper">
                <input id="login-password" name="password" type="password" class="login-input"
                       autocomplete="current-password" required>
                <button type="button" class="login-password-toggle" aria-label="Show password"
                        data-target="login-password">Show</button>
            </div>
        </div>

        <p id="login-error" class="login-error" aria-live="polite"></p>

        <button type="submit" class="login-submit">Log In</button>
    </form>
</dialog>

<script type="module" src="./main.ts"></script>
</body>
</html>
