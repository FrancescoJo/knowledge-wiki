<ul class="nav-items" th:fragment="menuBar" xmlns:th="http://www.thymeleaf.org">
  <th:block th:each="item : ${menuBar.items}">
    <!-- MenuDivider: vertical separator -->
    <li class="nav-divider" role="separator" th:if="${item.class.simpleName == 'MenuDivider'}"></li>
    <!-- MenuItem: expandable with children — button prevents page navigation -->
    <li class="nav-item has-dropdown" th:if="${item.class.simpleName == 'MenuItem' and item.visible}">
      <button class="nav-btn" onclick="toggleNavDropdown(this)"
              th:attr="aria-expanded='false',aria-haspopup='true',aria-disabled=${!item.enabled} ? 'true' : null"
              th:classappend="${!item.enabled} ? ' is-disabled'"
              th:text="${item.label}"
              type="button">Label
      </button>
      <ul class="dropdown" role="menu">
        <th:block th:each="child : ${item.children}">
          <li class="dropdown-divider" role="separator" th:if="${child.class.simpleName == 'MenuDivider'}"></li>
          <li role="none" th:if="${child.class.simpleName != 'MenuDivider' and child.visible}">
            <a role="menuitem" th:attr="aria-disabled=${!child.enabled} ? 'true' : null" th:classappend="${!child.enabled} ? ' is-disabled'"
               th:href="${child.href}"
               th:text="${child.label}">Child</a>
          </li>
        </th:block>
      </ul>
    </li>
    <!-- SimpleMenuItem: leaf link -->
    <li class="nav-item" th:if="${item.class.simpleName == 'SimpleMenuItem' and item.visible}">
      <a th:attr="aria-disabled=${!item.enabled} ? 'true' : null" th:classappend="${!item.enabled} ? ' is-disabled'"
         th:href="${item.href}"
         th:text="${item.label}">Label</a>
    </li>
  </th:block>
</ul>
