<div class="breadcrumb-bar" th:fragment="breadcrumb" xmlns:th="http://www.thymeleaf.org">
  <nav aria-label="Breadcrumb" class="breadcrumb">
    <span th:text="#{breadcrumb.home}">Home</span>
  </nav>
  <div class="search-box">
    <input name="q" th:attr="aria-label=#{search.submit}" th:placeholder="#{search.placeholder}" type="search">
    <button th:text="#{search.submit}" type="submit">Search</button>
  </div>
</div>
