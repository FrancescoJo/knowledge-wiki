<div class="breadcrumb-bar" th:fragment="breadcrumb" xmlns:th="http://www.thymeleaf.org">
  <nav aria-label="Breadcrumb" class="breadcrumb">
    <th:block th:if="${breadcrumbs != null}">
      <th:block th:each="item, stat : ${breadcrumbs}">
        <span aria-hidden="true" class="breadcrumb-sep" th:if="${!stat.first}"> › </span>
        <a th:href="${item.href}" th:if="${item.href != null}" th:text="${item.label}">Link</a>
        <span th:if="${item.href == null}" th:text="${item.label}">Label</span>
      </th:block>
    </th:block>
    <span th:if="${breadcrumbs == null}" th:text="#{breadcrumb.home}">Home</span>
  </nav>
  <div class="search-box">
    <input name="q" th:attr="aria-label=#{search.submit}" th:placeholder="#{search.placeholder}" type="search">
    <button th:text="#{search.submit}" type="submit">Search</button>
  </div>
</div>
