<dialog aria-labelledby="login-popup-title" class="login-dialog" id="login-popup" th:fragment="loginPopup"
        xmlns:th="http://www.thymeleaf.org">
  <form action="/api/v1/auth/login" class="login-form"
        hx-post="/api/v1/auth/login" hx-swap="none"
        id="login-form"
        method="post">
    <header class="login-dialog-header">
      <h2 class="login-dialog-title" id="login-popup-title" th:text="#{login.title}">Log In</h2>
      <button class="login-dialog-close" onclick="document.getElementById('login-popup').close()"
              th:attr="aria-label=#{login.close}"
              type="button">&#x2715;
      </button>
    </header>

    <div class="login-field">
      <label class="login-label" for="login-email" th:text="#{login.email}">Email</label>
      <input autocomplete="username" class="login-input" id="login-email" name="email"
             required type="email">
    </div>

    <div class="login-field">
      <label class="login-label" for="login-password" th:text="#{login.password}">Password</label>
      <div class="login-password-wrapper">
        <input autocomplete="current-password" class="login-input" id="login-password" name="password"
               required type="password">
        <button aria-label="Show password" class="login-password-toggle" data-target="login-password"
                th:text="#{login.password.show}" type="button">Show
        </button>
      </div>
    </div>

    <p aria-live="polite" class="login-error" id="login-error"></p>

    <button class="login-submit" th:text="#{login.submit}" type="submit">Log In</button>
  </form>
</dialog>
