<dialog xmlns:th="http://www.thymeleaf.org" th:fragment="loginPopup" id="login-popup" class="login-dialog" aria-labelledby="login-popup-title">
    <form id="login-form" class="login-form"
          hx-post="/api/v1/auth/login"
          hx-target="#login-error"
          hx-swap="innerHTML">
        <header class="login-dialog-header">
            <h2 id="login-popup-title" class="login-dialog-title">Log In</h2>
            <button type="button" class="login-dialog-close" aria-label="Close login dialog"
                    onclick="document.getElementById('login-popup').close()">&#x2715;</button>
        </header>

        <div class="login-field">
            <label for="login-email" class="login-label">Email</label>
            <input id="login-email" name="email" type="email" class="login-input"
                   autocomplete="email" required>
        </div>

        <div class="login-field">
            <label for="login-password" class="login-label">Password</label>
            <div class="login-password-wrapper">
                <input id="login-password" name="password" type="password" class="login-input"
                       autocomplete="current-password" required>
                <button type="button" class="login-password-toggle" aria-label="Show password"
                        data-target="login-password">Show</button>
            </div>
        </div>

        <p id="login-error" class="login-error" aria-live="polite"></p>

        <button type="submit" class="login-submit">Log In</button>
    </form>
</dialog>
<script>
(function () {
    document.addEventListener('click', function (e) {
        var btn = e.target.closest('.login-password-toggle');
        if (!btn) return;
        var input = document.getElementById(btn.dataset.target);
        if (!input) return;
        var isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.textContent = isPassword ? 'Hide' : 'Show';
        btn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
    });
}());
</script>
