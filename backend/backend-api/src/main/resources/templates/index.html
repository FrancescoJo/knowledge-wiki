<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnimemo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            color: #667eea;
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .status-check {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .status-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .status-value {
            font-size: 1.2rem;
            color: #28a745;
            font-weight: 600;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        .error {
            color: #dc3545;
        }
    </style>
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
    <script src="@textedit.script@"></script>
</head>
<body>
    <div class="container">
        <h1>Omnimemo</h1>
        <p>Welcome to this Kotlin/JVM Spring Boot application with a multi-module structure.</p>

        <div class="status-check">
            <div class="status-label">API Status:</div>
            <div id="status"
                 class="status-value"
                 hx-get="/health"
                 hx-trigger="load"
                 hx-swap="innerHTML">Checking...</div>
            <button hx-get="/health"
                    hx-target="#status"
                    hx-swap="innerHTML"
                    style="margin-top: 1rem;">Refresh Status</button>
        </div>
    </div>
</body>
</html>
