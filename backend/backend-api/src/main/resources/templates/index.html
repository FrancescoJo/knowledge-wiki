<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main})}">
<main>
    <section class="health-panel">
        <h2>Server Status</h2>
        <div class="status-row">
            <span id="status"
                  hx-get="/health"
                  hx-trigger="load"
                  hx-swap="outerHTML">Checking...</span>
            <button hx-get="/health"
                    hx-target="#status"
                    hx-swap="outerHTML">Refresh</button>
        </div>
    </section>
</main>
</html>
